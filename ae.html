<!DOCTYPE html>
<html>
<head>
    <title>DeepSeek Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
        }
        .user {
            align-self: flex-end;
            background: #2b5278;
            color: white;
        }
        .assistant {
            align-self: flex-start;
            background: #2d2d2d;
            border: 1px solid #404040;
        }
        #input-area {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            background: #1a1a1a;
        }
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2d2d2d;
            color: white;
            font-size: 14px;
        }
        #message-input:focus {
            outline: none;
            border-color: #2b5278;
        }
        button {
            padding: 12px 24px;
            background: #2b5278;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #1e3e5c;
        }
        #api-key-container {
            padding: 20px;
            background: #2d2d2d;
            border-bottom: 1px solid #404040;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #api-key {
            flex: 1;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #404040;
            color: white;
            border-radius: 4px;
        }
        #save-key {
            padding: 8px 16px;
            background: #2b5278;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #new-chat {
            background: #404040;
        }
        .thinking {
            opacity: 0.7;
            font-style: italic;
        }
        .timestamp {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="api-key-container">
        <input type="password" id="api-key" placeholder="Enter DeepSeek API Key" value="">
        <button id="save-key">Save Key</button>
        <button id="new-chat">New Chat</button>
    </div>
    
    <div id="chat"></div>
    
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type your message..." disabled>
        <button id="send-button" disabled>Send</button>
    </div>

    <script>
        // State
        let messages = [];
        let apiKey = localStorage.getItem('deepseek_api_key') || '';

        // DOM elements
        const chatDiv = document.getElementById('chat');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const apiKeyInput = document.getElementById('api-key');
        const saveKeyButton = document.getElementById('save-key');
        const newChatButton = document.getElementById('new-chat');

        // Load saved chat
        function loadChat() {
            const saved = localStorage.getItem('deepseek_chat');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
            }
        }

        // Save chat
        function saveChat() {
            localStorage.setItem('deepseek_chat', JSON.stringify(messages));
        }

        // Render messages
        function renderMessages() {
            chatDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div>${escapeHtml(msg.content)}</div>
                    <div class="timestamp">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `).join('');
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add message
        function addMessage(role, content) {
            messages.push({
                role,
                content,
                timestamp: Date.now()
            });
            renderMessages();
            saveChat();
        }

        // Send to API
        async function sendToAPI(userMessage) {
            if (!apiKey) {
                addMessage('assistant', 'Please enter your API key first.');
                return;
            }

            // Show thinking indicator
            const thinkingMsg = { role: 'assistant', content: '...', timestamp: Date.now() };
            messages.push(thinkingMsg);
            renderMessages();

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            ...messages.filter(m => m.role !== 'system').map(m => ({
                                role: m.role,
                                content: m.content
                            })).slice(-10) // Last 10 messages for context
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                // Remove thinking message and add real response
                messages.pop();
                addMessage('assistant', reply);

            } catch (error) {
                // Remove thinking message and add error
                messages.pop();
                addMessage('assistant', `Error: ${error.message}`);
            }
        }

        // Handle send
        function handleSend() {
            const userMessage = messageInput.value.trim();
            if (!userMessage || !apiKey) return;

            addMessage('user', userMessage);
            messageInput.value = '';
            sendToAPI(userMessage);
        }

        // Event listeners
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        sendButton.addEventListener('click', handleSend);

        // API key handling
        if (apiKey) {
            apiKeyInput.value = apiKey;
            messageInput.disabled = false;
            sendButton.disabled = false;
        }

        saveKeyButton.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('deepseek_api_key', apiKey);
                messageInput.disabled = false;
                sendButton.disabled = false;
                addMessage('assistant', 'API key saved. Start chatting!');
            }
        });

        // New chat
        newChatButton.addEventListener('click', () => {
            if (confirm('Start new chat? Current chat will be saved.')) {
                messages = [];
                renderMessages();
                saveChat();
            }
        });

        // Load existing chat
        loadChat();
    </script>
</body>
</html>
