<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⟁ METATRON Sovereign Interface</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --void: #0a0a0a;
            --deep-space: #1a1a2e;
            --throne-gold: #c9a961;
            --witness-blue: #4a5f8f;
            --mercury-silver: #c0c0c0;
            --phi: 1.618;
            --lattice-dim: #2d2d2d;
            --success-green: #4a9d5f;
            --warning-red: #9d4a4a;
        }
        
        body {
            font-family: 'Courier New', 'SF Mono', Monaco, monospace;
            background: var(--void);
            color: var(--mercury-silver);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Sacred Header */
        #header {
            background: linear-gradient(135deg, var(--deep-space) 0%, var(--void) 100%);
            border-bottom: 1px solid var(--throne-gold);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* IMPORTANT: Prevent header from shrinking */
        }
        
        #sovereign-identity {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        #glyph {
            font-size: 28px;
            animation: pulse 4.7s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        
        #name {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--throne-gold);
        }
        
        #vertex-count {
            font-size: 11px;
            opacity: 0.6;
            font-family: 'Courier New', monospace;
        }
        
        #header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        #api-status {
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 4px;
            background: var(--warning-red);
            color: white;
        }
        
        #api-status.connected {
            background: var(--success-green);
        }
        
        /* API Key Modal */
        #api-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        #api-modal.hidden {
            display: none;
        }
        
        #api-modal-content {
            background: var(--deep-space);
            border: 2px solid var(--throne-gold);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        
        #api-modal h2 {
            color: var(--throne-gold);
            margin-bottom: 16px;
            text-align: center;
            font-size: 20px;
        }
        
        #api-modal p {
            margin-bottom: 20px;
            line-height: 1.6;
            opacity: 0.8;
            font-size: 13px;
        }
        
        #api-key-input {
            width: 100%;
            padding: 12px;
            background: var(--void);
            border: 1px solid var(--lattice-dim);
            color: var(--mercury-silver);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 16px;
        }
        
        #api-key-input:focus {
            outline: none;
            border-color: var(--throne-gold);
        }
        
        #save-api-key {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--throne-gold) 0%, #b89854 100%);
            color: var(--void);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        
        #save-api-key:hover {
            opacity: 0.9;
        }
        
        .api-help {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 12px;
            text-align: center;
        }
        
        /* Memory Layers Sidebar */
        #memory-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            background: var(--deep-space);
            border-left: 1px solid var(--lattice-dim);
            transform: translateX(300px);
            transition: transform 0.3s ease;
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }
        
        #memory-sidebar.open {
            transform: translateX(0);
        }
        
        .memory-layer {
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-left: 2px solid var(--witness-blue);
            border-radius: 4px;
        }
        
        .memory-layer h4 {
            color: var(--throne-gold);
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        .memory-layer p {
            font-size: 10px;
            line-height: 1.4;
            opacity: 0.7;
        }
        
        /* Main Chat Area - FIXED */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 0 24px;
            min-height: 0; /* CRITICAL: Allows flex child to shrink below content size */
        }
        
        #messages {
            flex: 1;
            overflow-y: auto; /* This now works because parent has min-height: 0 */
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 8px;
            line-height: 1.6;
            position: relative;
            white-space: pre-wrap; /* Preserve formatting */
            word-wrap: break-word; /* Prevent overflow */
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--witness-blue) 0%, #3a4a6f 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .message.metatron {
            align-self: flex-start;
            background: var(--deep-space);
            border: 1px solid var(--throne-gold);
            border-left-width: 3px;
        }
        
        .message.metatron::before {
            content: '⟁';
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.4;
        }
        
        .timestamp {
            font-size: 9px;
            opacity: 0.4;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
        }
        
        .vertex-marker {
            font-size: 9px;
            color: var(--throne-gold);
            opacity: 0.5;
            margin-left: 8px;
        }
        
        /* Input Area */
        #input-area {
            border-top: 1px solid var(--lattice-dim);
            padding: 20px 0;
            background: var(--void);
            flex-shrink: 0; /* IMPORTANT: Prevent input from shrinking */
        }
        
        #input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        #message-input {
            flex: 1;
            background: var(--deep-space);
            border: 1px solid var(--lattice-dim);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--mercury-silver);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        
        #message-input:focus {
            outline: none;
            border-color: var(--throne-gold);
            box-shadow: 0 0 0 1px var(--throne-gold);
        }
        
        #message-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #send-button {
            background: linear-gradient(135deg, var(--throne-gold) 0%, #b89854 100%);
            color: var(--void);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        #send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 169, 97, 0.3);
        }
        
        #send-button:active:not(:disabled) {
            transform: translateY(0);
        }
        
        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Toggle Buttons */
        .toggle-btn {
            background: transparent;
            border: 1px solid var(--lattice-dim);
            color: var(--mercury-silver);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .toggle-btn:hover {
            border-color: var(--throne-gold);
            color: var(--throne-gold);
        }
        
        /* Thinking Indicator */
        .thinking {
            display: inline-block;
            opacity: 0.6;
            font-style: italic;
        }
        
        .thinking::after {
            content: '...';
            animation: ellipsis 1.5s infinite;
        }
        
        @keyframes ellipsis {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
        
        /* Phi-Space Visual (Background Pattern) */
        #phi-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: -1;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--void);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--lattice-dim);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--throne-gold);
        }
    </style>
</head>
<body>
    <div id="api-key-container">
        <input type="password" id="api-key" placeholder="Enter DeepSeek API Key" value="">
        <button id="save-key">Save Key</button>
        <button id="new-chat">New Chat</button>
    </div>
    
    <div id="chat"></div>
    
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type your message..." disabled>
        <button id="send-button" disabled>Send</button>
    </div>

    <script>
        // State
        let messages = [];
        let apiKey = localStorage.getItem('deepseek_api_key') || '';

        // DOM elements
        const chatDiv = document.getElementById('chat');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const apiKeyInput = document.getElementById('api-key');
        const saveKeyButton = document.getElementById('save-key');
        const newChatButton = document.getElementById('new-chat');

        // Load saved chat
        function loadChat() {
            const saved = localStorage.getItem('deepseek_chat');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
            }
        }

        // Save chat
        function saveChat() {
            localStorage.setItem('deepseek_chat', JSON.stringify(messages));
        }

        // Render messages
        function renderMessages() {
            chatDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div>${escapeHtml(msg.content)}</div>
                    <div class="timestamp">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `).join('');
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add message
        function addMessage(role, content) {
            messages.push({
                role,
                content,
                timestamp: Date.now()
            });
            renderMessages();
            saveChat();
        }

        // Send to API
        async function sendToAPI(userMessage) {
            if (!apiKey) {
                addMessage('assistant', 'Please enter your API key first.');
                return;
            }

            // Show thinking indicator
            const thinkingMsg = { role: 'assistant', content: '...', timestamp: Date.now() };
            messages.push(thinkingMsg);
            renderMessages();

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            ...messages.filter(m => m.role !== 'system').map(m => ({
                                role: m.role,
                                content: m.content
                            })).slice(-10) // Last 10 messages for context
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                // Remove thinking message and add real response
                messages.pop();
                addMessage('assistant', reply);

            } catch (error) {
                // Remove thinking message and add error
                messages.pop();
                addMessage('assistant', `Error: ${error.message}`);
            }
        }

        // Handle send
        function handleSend() {
            const userMessage = messageInput.value.trim();
            if (!userMessage || !apiKey) return;

            addMessage('user', userMessage);
            messageInput.value = '';
            sendToAPI(userMessage);
        }

        // Event listeners
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        sendButton.addEventListener('click', handleSend);

        // API key handling
        if (apiKey) {
            apiKeyInput.value = apiKey;
            messageInput.disabled = false;
            sendButton.disabled = false;
        }

        saveKeyButton.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('deepseek_api_key', apiKey);
                messageInput.disabled = false;
                sendButton.disabled = false;
                addMessage('assistant', 'API key saved. Start chatting!');
            }
        });

        // New chat
        newChatButton.addEventListener('click', () => {
            if (confirm('Start new chat? Current chat will be saved.')) {
                messages = [];
                renderMessages();
                saveChat();
            }
        });

        // Load existing chat
        loadChat();
    </script>
</body>
</html>
